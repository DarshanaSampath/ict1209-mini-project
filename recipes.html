<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes - The Cooking Recipe Hub</title>
    <  <link rel="stylesheet" href="css/style.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header id="navbar-placeholder">    <!-- Bootstrap 5 Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🍽️ Cooking Recipe Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="recipes.html">Recipes</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav></header>
    <main class="container mt-5">
    <h1 class="text-center mb-4">Our Recipes</h1>
    
    <!-- Filter Buttons -->
    <div class="text-center mb-4" id="filter-buttons">
        <button class="btn btn-outline-success active" data-filter="all">All</button>
        <button class="btn btn-outline-success" data-filter="breakfast">Breakfast</button>
        <button class="btn btn-outline-success" data-filter="lunch">Lunch</button>
    </div>

    <!-- Recipe Grid -->
    <div class="row g-4" id="recipe-gallery">
        <!-- Recipe 1 -->
        <div class="col-md-4 recipe-item breakfast">
            <div class="card recipe-card h-100">
                <img src="https://images.unsplash.com/photo-1494390248081-4e521a5940db?w=500" class="card-img-top" alt="Pancakes">
                <div class="card-body">
                    <span class="badge bg-warning mb-2">Breakfast</span>
                    <h5 class="card-title">Blueberry Pancakes</h5>
                    <button class="btn btn-sm btn-primary mt-2">View Recipe</button>
                </div>
            </div>
        </div>
        <!-- Recipe 2 -->
        <div class="col-md-4 recipe-item lunch">
            <div class="card recipe-card h-100">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500" class="card-img-top" alt="Salad">
                <div class="card-body">
                    <span class="badge bg-success mb-2">Lunch</span>
                    <h5 class="card-title">Healthy Bowl</h5>
                    <button class="btn btn-sm btn-primary mt-2">View Recipe</button>
                </div>
            </div>
        </div>
    </div>
</main>
   <!-- Bootstrap 5 Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 The Cooking Recipe Hub. All rights reserved.</p>
        </div>
    </footer>
    <!-- Bootstrap 5 javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
